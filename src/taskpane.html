<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>RCC Mail</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
  <h2>RCC Mail</h2>

  <!-- Shows current default mailbox once settings are configured -->
  <div id="defaultBadge" class="default-badge">
    Buzón: <span id="defaultName"></span>
  </div>

  <button class="btn-primary btn-block" onclick="window.location.href='compose.html'">
    📧&nbsp; Enviar Correo
  </button>
  <button class="btn-secondary btn-block" onclick="openSettings()">
    ⚙&nbsp; Configuracion
  </button>

  <div id="noMailboxWarning" class="status status-info" style="display:none;">
    Primero configure un buzón en "Configuracion".
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
