<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Enviar Correo - RCC</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
</head>
<body>
  <a class="back-link" onclick="goBack()">← Volver</a>
  <h2>Enviar Correo</h2>

  <div id="statusMsg" class="status"></div>

  <div class="note" style="margin-bottom:12px;">
    <strong>Nota:</strong> Requiere cuenta Microsoft 365 del trabajo/escuela (no Outlook.com personal)
  </div>

  <label>Token de sesión:</label>
  <div style="display:flex; gap:8px; margin-bottom:12px;">
    <input type="text" id="tokenInput" placeholder="Pega el token aquí" style="flex:1;font-size:12px;font-family:monospace;"/>
    <button class="btn-secondary" onclick="pasteToken()" style="padding:4px 12px;">📋 Pegar</button>
  </div>

  <label>De (Buzón):</label>
  <select id="fromSelect"></select>

  <label>Para: *</label>
  <input type="text" id="toField" placeholder="a@empresa.com; b@empresa.com"/>
  <div class="note">Separa múltiples destinatarios con ; o ,</div>

  <label>CC:</label>
  <input type="text" id="ccField" placeholder="copia@empresa.com (opcional)"/>

  <label>Asunto:</label>
  <input type="text" id="subjectField" placeholder="Asunto del correo"/>

  <label>Mensaje:</label>
  <textarea id="bodyField" placeholder="Escriba su mensaje aquí..."></textarea>

  <div class="btn-row">
    <button class="btn-primary" onclick="sendEmail()">Enviar</button>
    <button class="btn-secondary" onclick="getToken()">Obtener Token (SSO)</button>
    <button class="btn-secondary" onclick="loginMsal()">Login MSAL</button>
    <button class="btn-secondary" onclick="goBack()">Cancelar</button>
  </div>

  <script src="compose.js"></script>
</body>
</html>
