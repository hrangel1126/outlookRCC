<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Enviar Correo - RCC</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
  <a class="back-link" onclick="goBack()">← Volver</a>
  <h2>Enviar Correo</h2>

  <div id="statusMsg" class="status"></div>

  <label>Token de sesión:</label>
  <input type="text" id="tokenInput" placeholder="Token del login externo" style="width:100%;font-size:11px;font-family:monospace;margin-bottom:8px;"/>
  <button class="btn-secondary" onclick="getToken()" style="margin-bottom:8px;">🔑 Obtener Token</button>
  <div style="font-size:11px;margin-bottom:12px;">
    ¿No tienes token? <a href="login.html" target="_blank">Ir a login.html</a> para obtener uno
  </div>

  <label>De (Buzón):</label>
  <select id="fromSelect"></select>

  <label>Para: *</label>
  <input type="text" id="toField" placeholder="a@empresa.com; b@empresa.com"/>
  <div class="note">Separa múltiples destinatarios con ; o ,</div>

  <label>CC:</label>
  <input type="text" id="ccField" placeholder="copia@empresa.com (opcional)"/>

  <label>Asunto:</label>
  <input type="text" id="subjectField" placeholder="Asunto del correo"/>

  <label>Mensaje:</label>
  <textarea id="bodyField" placeholder="Escriba su mensaje aquí..."></textarea>

  <div class="btn-row">
    <button class="btn-primary" onclick="sendEmail()">Enviar</button>
    <button class="btn-secondary" onclick="goBack()">Cancelar</button>
  </div>

  <script src="compose.js"></script>
</body>
</html>
