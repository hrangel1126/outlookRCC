<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Enviar Correo - RCC</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
  <script src="msal-config.js"></script>
</head>
<body>
  <a class="back-link" onclick="goBack()">← Volver</a>
  <h2>Enviar Correo</h2>

  <!-- Auth status bar — shows who is logged in or the Login button -->
  <div id="authBar" style="margin-bottom:12px;">
    <div id="loggedInBar" style="display:none;">
      <div class="status status-success" style="display:flex; justify-content:space-between; align-items:center;">
        <span>✓ <span id="loggedInEmail"></span></span>
        <a style="cursor:pointer; font-size:11px; color:#107c10;" onclick="logout()">Cerrar sesión</a>
      </div>
    </div>
    <div id="loggedOutBar" style="display:none;">
      <button class="btn-primary btn-block" onclick="login()">🔑 Iniciar sesión con Microsoft</button>
      <div class="note">Necesario para enviar correos directamente via Graph API.</div>
    </div>
  </div>

  <div id="statusMsg" class="status"></div>

  <label>De (Buzón):</label>
  <select id="fromSelect"></select>

  <label>Para: *</label>
  <input type="text" id="toField" placeholder="a@empresa.com; b@empresa.com"/>
  <div class="note">Separa múltiples destinatarios con ; o ,</div>

  <label>CC:</label>
  <input type="text" id="ccField" placeholder="copia@empresa.com (opcional)"/>

  <label>Asunto:</label>
  <input type="text" id="subjectField" placeholder="Asunto del correo"/>

  <label>Mensaje:</label>
  <textarea id="bodyField" placeholder="Escriba su mensaje aquí..."></textarea>

  <div class="btn-row">
    <button id="btnSend" class="btn-primary" onclick="sendEmail()" disabled>Enviar</button>
    <button class="btn-secondary" onclick="goBack()">Cancelar</button>
  </div>

  <script src="compose.js"></script>
</body>
</html>
